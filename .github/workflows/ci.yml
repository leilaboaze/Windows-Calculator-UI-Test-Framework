name: Calculator UI Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  ui-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Verify Calculator is installed
        run: |
          Get-AppxPackage -Name Microsoft.WindowsCalculator
        shell: pwsh

      - name: Run UI tests
        run: mvn clean test --batch-mode
        shell: pwsh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JAVA_TOOL_OPTIONS: "-Djava.awt.headless=false"

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'target/surefire-reports/*.xml'
          check_name: 'Calculator UI Test Results'
          fail_on_failure: true

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-screenshots
          path: target/screenshots/
          retention-days: 7